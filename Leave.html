<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus - All-in-One System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif; background: #f8fafc; }
        .premium-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.7); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-page" class="max-w-md mx-auto mt-20 fade-in">
        <div class="premium-card p-10 rounded-[2.5rem] shadow-xl text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">CubicPlus</h1>
            <p class="text-slate-500 mb-8 text-sm uppercase tracking-widest font-bold">Employee Portal</p>
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1">Username</label>
                    <input type="text" id="login-user" class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1">Password</label>
                    <input type="password" id="login-pass" class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium">
                </div>
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-lg active:scale-95 mt-4">
                    LOGIN
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="max-w-6xl mx-auto hidden fade-in">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight" id="welcome-name">ยินดีต้อนรับ</h1>
                <p class="text-slate-500 mt-1" id="welcome-text">Employee Dashboard</p>
            </div>
            <div class="flex gap-3">
                <button onclick="logout()" class="bg-white border border-slate-200 text-slate-600 px-6 py-4 rounded-2xl font-bold hover:bg-rose-50 hover:text-rose-600 transition-all">LOGOUT</button>
                <button onclick="toggleModal(true)" class="bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-lg hover:bg-indigo-600 transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> ยื่นใบลา
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="premium-card p-8 rounded-[2rem] shadow-sm flex flex-col items-center justify-center gap-4 border-l-8 border-emerald-400">
                <h3 class="font-bold text-slate-400 text-xs uppercase tracking-widest">เช็คอินเข้างาน</h3>
                <button onclick="handleAttendance('checkIn')" class="w-20 h-20 bg-emerald-500 text-white rounded-full shadow-lg shadow-emerald-200 hover:scale-110 transition-transform active:scale-90">
                    <i class="fas fa-sign-in-alt text-2xl"></i>
                </button>
            </div>
            <div class="premium-card p-8 rounded-[2rem] shadow-sm flex flex-col items-center justify-center gap-4 border-l-8 border-rose-400">
                <h3 class="font-bold text-slate-400 text-xs uppercase tracking-widest">เช็คเอาท์ออกงาน</h3>
                <button onclick="handleAttendance('checkOut')" class="w-20 h-20 bg-rose-500 text-white rounded-full shadow-lg shadow-rose-200 hover:scale-110 transition-transform active:scale-90">
                    <i class="fas fa-sign-out-alt text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-pills"></i></div>
                <div><p class="text-slate-400 text-[10px] font-bold uppercase">ลาป่วย</p><h2 class="text-2xl font-bold" id="sick-val">-- / --</h2></div>
            </div>
            <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-calendar-check"></i></div>
                <div><p class="text-slate-400 text-[10px] font-bold uppercase">ลากิจ</p><h2 class="text-2xl font-bold" id="personal-val">-- / --</h2></div>
            </div>
            <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                <div class="w-14 h-14 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-palm-tree"></i></div>
                <div><p class="text-slate-400 text-[10px] font-bold uppercase">ลาพักร้อน</p><h2 class="text-2xl font-bold" id="vacation-val">-- / --</h2></div>
            </div>
        </div>

        <div class="premium-card rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
            <div class="p-8 border-b border-slate-50 bg-white/50"><h3 class="font-bold text-lg text-slate-800">ประวัติการลาของคุณ</h3></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-50">
                            <th class="p-8">ประเภท</th><th class="p-8">ระยะเวลา</th><th class="p-8 text-center">จำนวนวัน</th><th class="p-8">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-slate-50 text-sm">
                        <tr><td colspan="4" class="p-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden fade-in">
            <div class="p-8 flex justify-between items-center border-b border-slate-50">
                <h3 class="text-xl font-bold text-slate-900">ยื่นคำขอลา</h3>
                <button onclick="toggleModal(false)" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <form id="leaveForm" class="p-8 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider">ประเภทการลา</label>
                    <select id="leaveType" required class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium">
                        <option value="ลาป่วย">ลาป่วย</option><option value="ลากิจ">ลากิจ</option><option value="ลาพักร้อน">ลาพักร้อน</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 mb-3">เริ่มต้น</label><input type="date" id="startDate" required class="w-full px-5 py-4 bg-slate-50 rounded-2xl"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-3">สิ้นสุด</label><input type="date" id="endDate" required class="w-full px-5 py-4 bg-slate-50 rounded-2xl"></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 mb-3">เหตุผล</label><textarea id="reason" rows="3" required class="w-full px-5 py-4 bg-slate-50 rounded-2xl" placeholder="ระบุรายละเอียด..."></textarea></div>
                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">ส่งคำขอลา</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'ใส่_URL_ที่ได้จาก_DEPLOY_เวอร์ชันล่าสุด_ตรงนี้'; 

        // 🟢 ฟังก์ชัน LOGIN
        async function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            if(!user || !pass) return alert('กรุณากรอกข้อมูลให้ครบ');

            const btn = document.getElementById('login-btn');
            btn.innerText = 'กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                const res = await fetch(`${SCRIPT_URL}?user=${user}&pass=${pass}`);
                const data = await res.json();
                if(data.status === 'success') {
                    localStorage.setItem('userLogin', data.user);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userRole', data.role);
                    showMainApp();
                } else {
                    alert(data.message);
                }
            } catch(e) { alert('การเชื่อมต่อล้มเหลว'); }
            btn.innerText = 'LOGIN'; btn.disabled = false;
        }

        // 🟢 ฟังก์ชันแสดงหน้าหลัก & ดึงข้อมูล
        function showMainApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('welcome-name').innerText = `สวัสดีคุณ ${localStorage.getItem('userName')}`;
            loadLeaveData();
        }

        // 🟢 ฟังก์ชันลงเวลา (Check In/Out)
        async function handleAttendance(action) {
            const user = localStorage.getItem('userLogin');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=${action}&user=${user}`);
                const data = await res.json();
                alert(data.message);
            } catch(e) { alert('เกิดข้อผิดพลาด'); }
        }

        // 🟢 ฟังก์ชันดึงข้อมูลโควตาและประวัติการลา
        async function loadLeaveData() {
            const user = localStorage.getItem('userLogin');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getLeaveData&user=${encodeURIComponent(user)}`);
                const data = await res.json();
                
                if (data.quota) {
                    document.getElementById('sick-val').innerText = `${data.quota.sick.used} / ${data.quota.sick.limit}`;
                    document.getElementById('personal-val').innerText = `${data.quota.personal.used} / ${data.quota.personal.limit}`;
                    document.getElementById('vacation-val').innerText = `${data.quota.vacation.used} / ${data.quota.vacation.limit}`;
                }

                const historyBody = document.getElementById('history-body');
                if (data.history && data.history.length > 0) {
                    historyBody.innerHTML = data.history.map(item => {
                        const style = item.status === 'รออนุมัติ' ? 'bg-amber-50 text-amber-600' : (item.status === 'อนุมัติแล้ว' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600');
                        return `<tr><td class="p-8 font-bold">${item.type}</td><td class="p-8">${new Date(item.start).toLocaleDateString('th-TH')}</td><td class="p-8 text-center">${item.days}</td><td class="p-8"><span class="px-4 py-1.5 rounded-full ${style}">${item.status}</span></td></tr>`;
                    }).join('');
                } else {
                    historyBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">ยังไม่มีประวัติการลา</td></tr>';
                }
            } catch (e) { console.error(e); }
        }

        // 🟢 ฟังก์ชันยื่นใบลา
        document.getElementById('leaveForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'กำลังส่ง...'; btn.disabled = true;

            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;
            const days = Math.floor((new Date(eDate) - new Date(sDate)) / (1000 * 60 * 60 * 24)) + 1;

            const params = new URLSearchParams({
                action: 'submitLeave',
                user: localStorage.getItem('userLogin'),
                userName: localStorage.getItem('userName'),
                leaveType: document.getElementById('leaveType').value,
                startDate: sDate,
                endDate: eDate,
                days: days,
                reason: document.getElementById('reason').value
            });

            try {
                const res = await fetch(`${SCRIPT_URL}?${params.toString()}`);
                const data = await res.json();
                if(data.status === 'success') {
                    alert('ส่งใบลาเรียบร้อย');
                    toggleModal(false);
                    loadLeaveData();
                }
            } catch(err) { alert('ล้มเหลว'); }
            btn.innerText = 'ส่งคำขอลา'; btn.disabled = false;
        };

        function toggleModal(show) { document.getElementById('modal').classList.toggle('hidden', !show); }
        function logout() { localStorage.clear(); location.reload(); }
        
        // เช็คสถานะ Login ค้างไว้ไหม
        if(localStorage.getItem('userLogin')) showMainApp();
    </script>
</body>
</html>
