<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลา - CubicPlus Business Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="leave-app" class="max-w-7xl mx-auto p-4 lg:p-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">จัดการวันลา</h1>
            <p class="text-slate-500">ตรวจสอบสิทธิ์การลาและสถานะคำขอของคุณ</p>
        </div>
        <button onclick="toggleModal(true)" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl shadow-xl shadow-indigo-100 transition-all font-semibold flex items-center justify-center gap-2">
            <i class="fas fa-plus"></i> สร้างคำขอลาใหม่
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-thermometer-half"></i></div>
                <div>
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider">ลาป่วย</p>
                    <h2 class="text-2xl font-bold" id="sick-val">0 / 30 <span class="text-sm font-normal text-slate-400">วัน</span></h2>
                </div>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-user-tag"></i></div>
                <div>
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider">ลากิจ</p>
                    <h2 class="text-2xl font-bold" id="personal-val">0 / 0 <span class="text-sm font-normal text-slate-400">วัน</span></h2>
                </div>
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-plane-departure"></i></div>
                <div>
                    <p class="text-slate-400 text-sm font-medium uppercase tracking-wider">ลาพักร้อน</p>
                    <h2 class="text-2xl font-bold" id="vacation-val">0 / 0 <span class="text-sm font-normal text-slate-400">วัน</span></h2>
                </div>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-6 border-b border-slate-50 bg-slate-50/50">
            <h3 class="font-bold text-lg">ประวัติการขอลาล่าสุด</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-slate-400 text-xs uppercase tracking-widest border-b border-slate-50">
                        <th class="p-6 font-semibold">ประเภท</th>
                        <th class="p-6 font-semibold">วันที่ลา</th>
                        <th class="p-6 font-semibold">จำนวนวัน</th>
                        <th class="p-6 font-semibold">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="history-body" class="divide-y divide-slate-50 text-sm font-medium">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-6 flex justify-between items-center border-b border-slate-100">
            <h3 class="text-xl font-bold">ยื่นคำขอลา</h3>
            <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form id="leaveForm" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2">ประเภทการลา</label>
                <select id="leaveType" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="ลาป่วย">ลาป่วย</option>
                    <option value="ลากิจ">ลากิจ</option>
                    <option value="ลาพักร้อน">ลาพักร้อน</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">เริ่มวันที่</label>
                    <input type="date" id="startDate" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">ถึงวันที่</label>
                    <input type="date" id="endDate" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">เหตุผลการลา</label>
                <textarea id="reason" rows="3" required class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="ระบุเหตุผล..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                ยืนยันการส่งคำขอ
            </button>
        </form>
    </div>
</div>

<script>
    // 1. ตั้งค่า URL และข้อมูลผู้ใช้
    const SCRIPT_URL = 'ใส่_URL_Web_App_จาก_Google_Apps_Script_ที่นี่'; 
    const CURRENT_USER = localStorage.getItem('username'); 
    const CURRENT_NAME = localStorage.getItem('name');

    window.onload = () => {
        if (!CURRENT_USER) {
            alert('กรุณาเข้าสู่ระบบก่อนใช้งาน');
            window.location.href = 'index.html'; // หรือหน้า login ของคุณ
            return;
        }
        loadLeaveData();
    };

    // 2. ฟังก์ชันดึงข้อมูล Quota และ History (อ้างอิงลำดับคอลัมน์ใหม่)
    async function loadLeaveData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getLeaveData&user=${CURRENT_USER}`);
            const data = await res.json();
            
            if (data.quota) {
                // ดึงค่า Limit และ Used มาแสดงผลตามการแมปคอลัมน์ใน Apps Script
                document.getElementById('sick-val').innerHTML = `${data.quota.sick.used} / ${data.quota.sick.limit} <span class="text-sm font-normal text-slate-400">วัน</span>`;
                document.getElementById('personal-val').innerHTML = `${data.quota.personal.used} / ${data.quota.personal.limit} <span class="text-sm font-normal text-slate-400">วัน</span>`;
                document.getElementById('vacation-val').innerHTML = `${data.quota.vacation.used} / ${data.quota.vacation.limit} <span class="text-sm font-normal text-slate-400">วัน</span>`;
            }

            const historyBody = document.getElementById('history-body');
            if (data.history && data.history.length > 0) {
                historyBody.innerHTML = data.history.map(item => {
                    const statusColor = item.status === 'รออนุมัติ' ? 'bg-amber-100 text-amber-600' : 
                                      item.status === 'อนุมัติแล้ว' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600';
                    
                    // จัดรูปแบบวันที่ให้สวยงาม
                    const options = { year: 'numeric', month: 'short', day: 'numeric' };
                    const start = new Date(item.start).toLocaleDateString('th-TH', options);
                    const end = new Date(item.end).toLocaleDateString('th-TH', options);

                    return `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="p-6 font-bold text-slate-700">${item.type}</td>
                            <td class="p-6 text-slate-500">${start} - ${end}</td>
                            <td class="p-6 text-slate-500">${item.days} วัน</td>
                            <td class="p-6">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">${item.status}</span>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                historyBody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-400">ไม่มีประวัติการลา</td></tr>';
            }
        } catch (e) { console.error('Error loading data:', e); }
    }

    // 3. ฟังก์ชันส่งคำขอลา
    document.getElementById('leaveForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'กำลังส่งคำขอ...';

        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        const formData = {
            action: 'submitLeave',
            user: CURRENT_USER,
            userName: CURRENT_NAME,
            leaveType: document.getElementById('leaveType').value,
            startDate: startDate,
            endDate: endDate,
            reason: document.getElementById('reason').value,
            days: calculateDays(startDate, endDate)
        };

        const params = new URLSearchParams(formData).toString();
        try {
            const response = await fetch(`${SCRIPT_URL}?${params}`);
            const result = await response.json();
            if (result.status === 'success') {
                alert('ส่งคำขอลาเรียบร้อยแล้ว!');
                toggleModal(false);
                document.getElementById('leaveForm').reset();
                loadLeaveData(); // โหลดข้อมูลใหม่
            }
        } catch (err) { 
            alert('เกิดข้อผิดพลาดในการส่งข้อมูล'); 
        } finally {
            btn.disabled = false;
            btn.innerText = 'ยืนยันการส่งคำขอ';
        }
    };

    function calculateDays(start, end) {
        const d1 = new Date(start);
        const d2 = new Date(end);
        return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
    }

    function toggleModal(show) {
        const m = document.getElementById('modal');
        show ? m.classList.remove('hidden') : m.classList.add('hidden');
    }
</script>
</body>
</html>
