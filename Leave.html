<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลา - CubicPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Kanit', sans-serif; background: #f8fafc; }
        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="leave-app" class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">การจัดการวันลา</h1>
            <p class="text-slate-500 mt-1">ตรวจสอบสิทธิ์และสถานะการลาของคุณ</p>
        </div>
        <button onclick="toggleModal(true)" class="group bg-slate-900 hover:bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-3">
            <i class="fas fa-plus text-sm group-hover:rotate-90 transition-transform"></i>
            <span class="font-bold tracking-wide">สร้างคำขอลาใหม่</span>
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-pills"></i></div>
            <div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">ลาป่วย</p>
                <h2 class="text-2xl font-bold text-slate-800" id="sick-val">-- / --</h2>
            </div>
        </div>
        <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-calendar-check"></i></div>
            <div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">ลากิจ</p>
                <h2 class="text-2xl font-bold text-slate-800" id="personal-val">-- / --</h2>
            </div>
        </div>
        <div class="premium-card p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
            <div class="w-14 h-14 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-2xl"><i class="fas fa-palmtree"></i></div>
            <div>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">ลาพักร้อน</p>
                <h2 class="text-2xl font-bold text-slate-800" id="vacation-val">-- / --</h2>
            </div>
        </div>
    </div>

    <div class="premium-card rounded-[2.5rem] shadow-sm overflow-hidden border border-slate-100">
        <div class="p-8 border-b border-slate-50 bg-white/50">
            <h3 class="font-bold text-lg text-slate-800">ประวัติการลา</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-[10px] uppercase tracking-[0.15em] border-b border-slate-50">
                        <th class="p-8">ประเภท</th>
                        <th class="p-8">ระยะเวลา</th>
                        <th class="p-8 text-center">จำนวนวัน</th>
                        <th class="p-8">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="history-body" class="divide-y divide-slate-50 text-sm">
                    <tr><td colspan="4" class="p-10 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden fade-in">
        <div class="p-8 flex justify-between items-center border-b border-slate-50">
            <h3 class="text-xl font-bold text-slate-900">ยื่นคำขอลา</h3>
            <button onclick="toggleModal(false)" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 text-slate-400 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="leaveForm" class="p-8 space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider ml-1">ประเภทการลา</label>
                <select id="leaveType" required class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all font-medium">
                    <option value="ลาป่วย">ลาป่วย</option>
                    <option value="ลากิจ">ลากิจ</option>
                    <option value="ลาพักร้อน">ลาพักร้อน</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider ml-1">เริ่มต้น</label>
                    <input type="date" id="startDate" required class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider ml-1">สิ้นสุด</label>
                    <input type="date" id="endDate" required class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-3 uppercase tracking-wider ml-1">เหตุผลการลา</label>
                <textarea id="reason" rows="3" required class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium" placeholder="ระบุรายละเอียด..."></textarea>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 active:scale-95">
                ยืนยันการส่งคำขอ
            </button>
        </form>
    </div>
</div>

<script>
    // 🔗 เชื่อมต่อกับระบบหน้าหลัก (Portal)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTUr0CwjDhR2vCKaqkcQlNrwsLXfZlDp9vqpGQSxaktbyV_3dWY1OGvPdRLtFBhYCzWA/exec'; 
    
    // ดึงข้อมูลจาก LocalStorage ที่หน้าหลักบันทึกไว้
    const CURRENT_USER = localStorage.getItem('userLogin'); // Username
    const CURRENT_NAME = localStorage.getItem('userName');  // Display Name

    window.onload = () => {
        if (!CURRENT_USER) {
            document.body.innerHTML = `<div class="h-screen flex items-center justify-center font-bold text-slate-400 uppercase tracking-widest">กรุณาเข้าสู่ระบบผ่านหน้าหลัก</div>`;
            return;
        }
        loadLeaveData();
    };

    async function loadLeaveData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getLeaveData&user=${encodeURIComponent(CURRENT_USER)}`);
            const data = await res.json();
            
            if (data.quota) {
                document.getElementById('sick-val').innerText = `${data.quota.sick.used} / ${data.quota.sick.limit}`;
                document.getElementById('personal-val').innerText = `${data.quota.personal.used} / ${data.quota.personal.limit}`;
                document.getElementById('vacation-val').innerText = `${data.quota.vacation.used} / ${data.quota.vacation.limit}`;
            }

            const historyBody = document.getElementById('history-body');
            if (data.history && data.history.length > 0) {
                historyBody.innerHTML = data.history.map(item => {
                    const statusStyles = {
                        'รออนุมัติ': 'bg-amber-50 text-amber-600',
                        'อนุมัติแล้ว': 'bg-emerald-50 text-emerald-600',
                        'ปฏิเสธ': 'bg-rose-50 text-rose-600'
                    };
                    const color = statusStyles[item.status] || 'bg-slate-50 text-slate-500';
                    
                    const start = new Date(item.start).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                    const end = new Date(item.end).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });

                    return `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="p-8 font-bold text-slate-700">${item.type}</td>
                            <td class="p-8 text-slate-500">${start} - ${end}</td>
                            <td class="p-8 text-center text-slate-500 font-bold">${item.days}</td>
                            <td class="p-8">
                                <span class="px-4 py-1.5 rounded-full text-[11px] font-bold ${color}">${item.status}</span>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                historyBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400">ยังไม่มีประวัติการแจ้งลา</td></tr>';
            }
        } catch (e) { 
            console.error(e);
            document.getElementById('history-body').innerHTML = '<tr><td colspan="4" class="p-10 text-center text-rose-400 text-xs">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</td></tr>';
        }
    }

    document.getElementById('leaveForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = 'กำลังส่งข้อมูล...';

        const sDate = document.getElementById('startDate').value;
        const eDate = document.getElementById('endDate').value;

        const formData = {
            action: 'submitLeave',
            user: CURRENT_USER,
            userName: CURRENT_NAME,
            leaveType: document.getElementById('leaveType').value,
            startDate: sDate,
            endDate: eDate,
            reason: document.getElementById('reason').value,
            days: calculateDays(sDate, eDate)
        };

        try {
            const params = new URLSearchParams(formData).toString();
            const response = await fetch(`${SCRIPT_URL}?${params}`);
            const result = await response.json();
            if (result.status === 'success') {
                alert('ส่งใบลาเรียบร้อยแล้ว');
                toggleModal(false);
                document.getElementById('leaveForm').reset();
                loadLeaveData();
            }
        } catch (err) { alert('เกิดข้อผิดพลาด'); }
        finally {
            btn.disabled = false;
            btn.innerText = 'ยืนยันการส่งคำขอ';
        }
    };

    function calculateDays(start, end) {
        const d1 = new Date(start);
        const d2 = new Date(end);
        return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
    }

    function toggleModal(show) {
        const m = document.getElementById('modal');
        show ? m.classList.remove('hidden') : m.classList.add('hidden');
    }
</script>
</body>
</html>
