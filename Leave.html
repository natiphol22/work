<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus | Leave Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --primary: #6366f1; }
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
        }

        .quota-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .quota-card:hover { transform: translateY(-5px); }

        .aura-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
            background: radial-gradient(circle at 10% 10%, #eff6ff 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #f5f3ff 0%, transparent 40%);
        }

        /* สำหรับ Mobile-Friendly Scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="aura-bg"></div>

    <div class="max-w-4xl mx-auto space-y-8">
        
        <div class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Leave Management</h1>
                <p id="userNameDisplay" class="text-slate-500 text-sm">Loading user data...</p>
            </div>
            <button onclick="history.back()" class="w-10 h-10 glass-panel rounded-full flex items-center justify-center text-slate-400 hover:text-indigo-500 transition-colors">
                <i data-lucide="arrow-left"></i>
            </button>
        </div>

        <div id="quotaContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="animate-pulse glass-panel h-32 rounded-[2rem]"></div>
             <div class="animate-pulse glass-panel h-32 rounded-[2rem]"></div>
             <div class="animate-pulse glass-panel h-32 rounded-[2rem]"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-panel p-8 rounded-[2.5rem] space-y-5">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                            <i data-lucide="calendar-plus"></i>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800">Request Leave</h2>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Type</label>
                            <select id="leaveType" class="w-full bg-slate-50/50 border border-slate-100 rounded-2xl p-3 outline-none focus:ring-2 focus:ring-indigo-500/20">
                                <option value="ลาป่วย">🤒 ลาป่วย</option>
                                <option value="ลากิจ">💼 ลากิจ</option>
                                <option value="ลาพักร้อน">🏝️ ลาพักร้อน</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Start</label>
                                <input type="date" id="startDate" class="w-full bg-slate-50/50 border border-slate-100 rounded-2xl p-3 text-sm">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">End</label>
                                <input type="date" id="endDate" class="w-full bg-slate-50/50 border border-slate-100 rounded-2xl p-3 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Reason</label>
                            <textarea id="reason" rows="3" class="w-full bg-slate-50/50 border border-slate-100 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20" placeholder="ระบุเหตุผลการลา..."></textarea>
                        </div>
                        <button onclick="submitLeave()" id="btnSubmit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                            <span>Submit Request</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div class="flex justify-between items-center px-4">
                    <h2 class="text-lg font-bold text-slate-800">History</h2>
                    <span id="historyCount" class="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-full font-bold">0 Items</span>
                </div>
                
                <div id="leaveHistory" class="space-y-3 overflow-y-auto max-h-[600px] pr-2 no-scrollbar">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyyWXFDOao_Es9bh0tgluCbu5aM0UEVPEoTi0mPJLg3TbfY68QDqDVA5QtHYr3kmLxtCA/exec"; // นำ URL จาก Apps Script มาวางที่นี่
        const userData = JSON.parse(localStorage.getItem('userData')) || { user: 'natiphol', name: 'เนติพล' };

        window.onload = () => {
            document.getElementById('userNameDisplay').innerText = `คุณ${userData.name} (@${userData.user})`;
            loadLeaveData();
            lucide.createIcons();
        };

        async function loadLeaveData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getLeaveData&user=${userData.user}`);
                const data = await res.json();
                renderQuota(data.quota);
                renderHistory(data.history);
            } catch (e) {
                console.error("Load failed", e);
            }
            lucide.createIcons();
        }

        function renderQuota(q) {
            const types = [
                { label: 'Sick Leave', used: q.sick.used, limit: q.sick.limit, icon: 'thermometer', color: 'text-rose-500', bg: 'bg-rose-50' },
                { label: 'Personal Leave', used: q.personal.used, limit: q.personal.limit, icon: 'briefcase', color: 'text-amber-500', bg: 'bg-amber-50' },
                { label: 'Vacation', used: q.vacation.used, limit: q.vacation.limit, icon: 'palmtree', color: 'text-emerald-500', bg: 'bg-emerald-50' }
            ];

            document.getElementById('quotaContainer').innerHTML = types.map(t => `
                <div class="glass-panel p-6 rounded-[2rem] quota-card relative overflow-hidden">
                    <div class="flex justify-between items-start">
                        <div class="w-12 h-12 ${t.bg} ${t.color} rounded-2xl flex items-center justify-center">
                            <i data-lucide="${t.icon}"></i>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black uppercase tracking-tighter text-slate-400">${t.label}</p>
                            <p class="text-2xl font-bold text-slate-800">${t.used}<span class="text-sm text-slate-300 font-light"> / ${t.limit}</span></p>
                        </div>
                    </div>
                    <div class="mt-4 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                        <div class="h-full ${t.color.replace('text', 'bg')}" style="width: ${(t.used/t.limit)*100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory(history) {
            const container = document.getElementById('leaveHistory');
            document.getElementById('historyCount').innerText = `${history.length} Items`;
            
            if (history.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-300 uppercase text-xs tracking-widest">No history found</div>`;
                return;
            }

            container.innerHTML = history.map(item => {
                const statusColor = item.status === 'อนุมัติ' ? 'bg-emerald-50 text-emerald-600' : 
                                    item.status === 'ปฏิเสธ' ? 'bg-rose-50 text-rose-600' : 'bg-amber-50 text-amber-600';
                return `
                    <div class="glass-panel p-5 rounded-[2rem] flex justify-between items-center group">
                        <div class="flex items-center gap-4">
                            <div class="text-center min-w-[50px]">
                                <p class="text-lg font-bold text-slate-700">${item.days}</p>
                                <p class="text-[9px] text-slate-400 uppercase font-bold">Days</p>
                            </div>
                            <div class="h-8 w-[1px] bg-slate-100"></div>
                            <div>
                                <h4 class="font-bold text-slate-700 text-sm">${item.type}</h4>
                                <p class="text-[10px] text-indigo-500">${new Date(item.start).toLocaleDateString('th-TH')} - ${new Date(item.end).toLocaleDateString('th-TH')}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] px-3 py-1 rounded-full font-bold uppercase ${statusColor}">${item.status}</span>
                            <p class="text-[10px] text-slate-300 mt-1">${item.reason || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function submitLeave() {
            const type = document.getElementById('leaveType').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const reason = document.getElementById('reason').value;

            if (!start || !end || !reason) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณากรอกข้อมูลให้ครบถ้วน' });
                return;
            }

            // คำนวณจำนวนวันคร่าวๆ
            const diffTime = Math.abs(new Date(end) - new Date(start));
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin w-5 h-5"></i>`;
            lucide.createIcons();

            try {
                const url = `${SCRIPT_URL}?action=submitLeave&user=${userData.user}&userName=${userData.name}&leaveType=${type}&startDate=${start}&endDate=${end}&days=${diffDays}&reason=${encodeURIComponent(reason)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.status === "success") {
                    Swal.fire({ icon: 'success', title: 'ส่งใบลาสำเร็จ', showConfirmButton: false, timer: 1500 });
                    document.getElementById('reason').value = "";
                    loadLeaveData();
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' });
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>Submit Request</span>`;
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
