<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-6">
        <!-- Card: Status -->
        <div class="glass rounded-[2rem] p-8 text-center shadow-xl">
            <h2 id="currentTime" class="text-4xl font-bold text-slate-800 mb-2">00:00:00</h2>
            <p id="currentDate" class="text-slate-500 mb-8"></p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="recordTime('checkIn')" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold hover:bg-emerald-600 transition-all active:scale-95 shadow-lg shadow-emerald-100">
                    Check In
                </button>
                <button onclick="recordTime('checkOut')" class="py-4 bg-rose-500 text-white rounded-2xl font-bold hover:bg-rose-600 transition-all active:scale-95 shadow-lg shadow-rose-100">
                    Check Out
                </button>
            </div>
        </div>

        <!-- Card: History -->
        <div class="glass rounded-[2rem] p-6 shadow-lg">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-bold text-slate-800">ประวัติการลงเวลา</h3>
                <span id="userRole" class="text-xs bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full font-semibold">User</span>
            </div>
            <div id="historyList" class="space-y-3 overflow-y-auto max-h-[300px]">
                <!-- ข้อมูลจะโหลดตรงนี้ -->
                <p class="text-center text-slate-400 text-sm py-4">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "URL_APPS_SCRIPT_ของคุณ";
        const userName = localStorage.getItem('userName') || "Unknown";
        const userLogin = localStorage.getItem('userLogin');

        // แสดงเวลา Real-time
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('th-TH');
            document.getElementById('currentDate').innerText = now.toLocaleDateString('th-TH', { dateStyle: 'full' });
        }, 1000);

        // บันทึกเวลา
        async function recordTime(action) {
            if(!confirm(`ยืนยันการ ${action === 'checkIn' ? 'เข้างาน' : 'ออกงาน'}?`)) return;
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=${action}&user=${userLogin}`);
                const data = await res.json();
                if(data.status === 'success') {
                    alert('บันทึกสำเร็จ');
                    loadHistory();
                }
            } catch (e) { alert('เกิดข้อผิดพลาด'); }
        }

        // ดึงข้อมูลมาโชว์
        async function loadHistory() {
            const container = document.getElementById('historyList');
            if(userLogin === 'admin') document.getElementById('userRole').innerText = "Administrator";
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=${userLogin}`);
                const data = await res.json(); // data คือ array จาก Google Sheet
                
                container.innerHTML = data.reverse().slice(0, 10).map(row => `
                    <div class="flex justify-between items-center p-4 bg-white/50 rounded-2xl border border-slate-100">
                        <div>
                            <p class="text-xs text-slate-400">${new Date(row[0]).toLocaleDateString()}</p>
                            <p class="font-semibold text-slate-700">${row[1] === userLogin ? 'คุณ' : row[1]} - ${row[2]}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-indigo-600">${new Date(row[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "ไม่สามารถโหลดข้อมูลได้"; }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
