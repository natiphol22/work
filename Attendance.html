<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus | Premium Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Kanit', sans-serif;
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff);
        }
        .premium-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .btn-gradient-in {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .btn-gradient-out {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .status-dot { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div class="w-full max-w-lg">
        <!-- Top Navigation / Brand -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-semibold text-slate-800 tracking-tight">Cubic<span class="text-indigo-600 font-bold">Plus</span></h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em]">Corporate Ecosystem</p>
            </div>
            <div class="flex items-center gap-3 bg-white/50 p-1.5 pr-4 rounded-full border border-white">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <span id="userNameDisplay" class="text-sm font-medium text-slate-600">Loading...</span>
            </div>
        </div>

        <!-- Main Dashboard Card -->
        <div class="glass-effect rounded-[3rem] p-10 premium-shadow relative overflow-hidden mb-6">
            <div class="absolute top-0 right-0 p-8 opacity-5">
                <i data-lucide="clock-3" class="w-32 h-32 text-indigo-900"></i>
            </div>
            
            <div class="relative z-10 text-center">
                <div id="statusBadge" class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-100 text-slate-500 text-[11px] font-bold tracking-widest uppercase mb-6 border border-slate-200/50">
                    <span class="w-2 h-2 rounded-full bg-slate-400 status-dot"></span>
                    Ready to Record
                </div>
                
                <h2 id="clock" class="text-7xl font-light text-slate-800 tracking-tighter mb-2">00:00:00</h2>
                <p id="dateText" class="text-slate-400 font-light tracking-wide mb-10"></p>

                <div class="grid grid-cols-2 gap-6">
                    <button onclick="recordTime('checkIn', this)" class="group relative overflow-hidden py-6 rounded-[2rem] text-white font-semibold transition-all hover:scale-[1.02] active:scale-95 btn-gradient-in shadow-lg shadow-emerald-200">
                        <div class="flex flex-col items-center gap-2">
                            <i data-lucide="log-in" class="w-6 h-6"></i>
                            <span class="text-sm">ลงเวลางาน</span>
                        </div>
                    </button>
                    
                    <button onclick="recordTime('checkOut', this)" class="group relative overflow-hidden py-6 rounded-[2rem] text-white font-semibold transition-all hover:scale-[1.02] active:scale-95 btn-gradient-out shadow-lg shadow-rose-200">
                        <div class="flex flex-col items-center gap-2">
                            <i data-lucide="log-out" class="w-6 h-6"></i>
                            <span class="text-sm">ลงเวลาออก</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Quick Info Widgets -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white/60 p-4 rounded-3xl border border-white text-center">
                <p class="text-[10px] text-slate-400 uppercase mb-1">In</p>
                <p id="lastIn" class="font-bold text-slate-700 text-sm">--:--</p>
            </div>
            <div class="bg-white/60 p-4 rounded-3xl border border-white text-center">
                <p class="text-[10px] text-slate-400 uppercase mb-1">Out</p>
                <p id="lastOut" class="font-bold text-slate-700 text-sm">--:--</p>
            </div>
            <div class="bg-indigo-600 p-4 rounded-3xl text-center shadow-lg shadow-indigo-100">
                <p class="text-[10px] text-indigo-200 uppercase mb-1">Total</p>
                <p id="totalHours" class="font-bold text-white text-sm">0h 0m</p>
            </div>
        </div>

        <!-- Activity History -->
        <div class="w-full">
            <div class="flex items-center justify-between px-2 mb-4">
                <h3 class="font-bold text-slate-800 tracking-tight">รายการล่าสุด</h3>
                <button onclick="loadPersonalToday()" class="p-2 hover:bg-indigo-50 rounded-full transition-colors text-indigo-400">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div id="personalHistory" class="space-y-3">
                <!-- Skeleton Loading -->
                <div class="animate-pulse flex justify-between p-5 bg-white/40 rounded-[1.5rem] border border-white">
                    <div class="h-4 bg-slate-200 rounded w-1/3"></div>
                    <div class="h-4 bg-slate-200 rounded w-1/4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs6htf33iNyVvOmL88GnAHzzEK665A4Mw6Z9gOWXVpxD0LfDEqqEagDlkRhovPC5KC_g/exec";
        const userLogin = localStorage.getItem('userLogin') || "Unknown User";
        document.getElementById('userNameDisplay').innerText = userLogin;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('dateText').innerText = now.toLocaleDateString('th-TH', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function recordTime(action, btn) {
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<div class="flex flex-col items-center gap-2 animate-pulse"><i data-lucide="loader-2" class="animate-spin w-6 h-6"></i><span class="text-sm">Processing...</span></div>`;
            lucide.createIcons();

            try {
                const res = await fetch(`${SCRIPT_URL}?action=${action}&user=${userLogin}`);
                const data = await res.json();
                if (data.status === "success") {
                    loadPersonalToday();
                } else {
                    alert(data.message);
                }
            } catch (e) { 
                alert("การเชื่อมต่อขัดข้อง"); 
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }

        async function loadPersonalToday() {
            const container = document.getElementById('personalHistory');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=${userLogin}`);
                const data = await res.json();
                const today = new Date().toDateString();
                const todayData = data.filter(item => new Date(item.timestamp).toDateString() === today);

                if (!todayData.length) {
                    container.innerHTML = `<div class="text-center py-10 text-slate-300 text-sm font-light italic">ยังไม่พบรายการของวันนี้</div>`;
                    return;
                }

                todayData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                container.innerHTML = todayData.map(item => {
                    const isIn = item.type.toLowerCase().includes('in');
                    return `
                        <div class="flex justify-between items-center p-5 bg-white/80 rounded-[1.8rem] border border-white/50 premium-shadow">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-2xl ${isIn ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'} flex items-center justify-center">
                                    <i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-slate-700 text-sm">${item.type}</p>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Confirmed</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-indigo-600 font-bold text-lg">${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</p>
                                <p class="text-[10px] text-slate-400">น.</p>
                            </div>
                        </div>
                    `;
                }).join('');

                // Update UI Summary
                const lastIn = todayData.find(i => i.type.toLowerCase().includes('in'));
                const lastOut = todayData.find(i => i.type.toLowerCase().includes('out'));
                if(lastIn) document.getElementById('lastIn').innerText = new Date(lastIn.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
                if(lastOut) document.getElementById('lastOut').innerText = new Date(lastOut.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});

                updateStatus(todayData[0].type.toLowerCase().includes('in') ? 'Working' : 'Offline');
                lucide.createIcons();
            } catch (e) { 
                container.innerHTML = `<p class="text-center text-xs text-rose-400">ไม่สามารถโหลดข้อมูลได้</p>`; 
            }
        }

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            if(status === 'Working') {
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 status-dot"></span> Online - Working`;
                badge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-emerald-50 text-emerald-600 text-[11px] font-bold tracking-widest uppercase mb-6 border border-emerald-100";
            } else {
                badge.innerHTML = `<span class="w-2 h-2 rounded-full bg-slate-400 status-dot"></span> Offline`;
                badge.className = "inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-100 text-slate-500 text-[11px] font-bold tracking-widest uppercase mb-6 border border-slate-200/50";
            }
        }

        window.onload = () => { loadPersonalToday(); lucide.createIcons(); };
    </script>
</body>
</html>
