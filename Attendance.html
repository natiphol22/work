<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-6">
        <!-- Card: Status -->
        <div class="glass rounded-[2rem] p-8 text-center shadow-xl">
            <h2 id="currentTime" class="text-4xl font-bold text-slate-800 mb-2">00:00:00</h2>
            <p id="currentDate" class="text-slate-500 mb-8"></p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="recordTime('checkIn')" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold hover:bg-emerald-600 transition-all active:scale-95 shadow-lg shadow-emerald-100">
                    Check In
                </button>
                <button onclick="recordTime('checkOut')" class="py-4 bg-rose-500 text-white rounded-2xl font-bold hover:bg-rose-600 transition-all active:scale-95 shadow-lg shadow-rose-100">
                    Check Out
                </button>
            </div>
        </div>

        <!-- Card: History -->
        <div class="glass rounded-[2rem] p-6 shadow-lg">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-bold text-slate-800">ประวัติการลงเวลา</h3>
                <span id="userRole" class="text-xs bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full font-semibold">User</span>
            </div>
            <div id="historyList" class="space-y-3 overflow-y-auto max-h-[300px]">
                <!-- ข้อมูลจะโหลดตรงนี้ -->
                <p class="text-center text-slate-400 text-sm py-4">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

<script>
    // ⚠️ สำคัญมาก: เปลี่ยนตรงนี้เป็น URL ที่ได้จากการ Deploy Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx.../exec"; 
    
    const userLogin = localStorage.getItem('userLogin') || "guest";

    async function loadHistory() {
        const container = document.getElementById('historyList');
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getHistory&user=${userLogin}`);
            const data = await response.json();
            
            if(data.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-4">ยังไม่มีข้อมูลบันทึก</p>';
                return;
            }

            // เรียงจากล่าสุดขึ้นก่อน และโชว์เฉพาะ 10 รายการ
            container.innerHTML = data.reverse().slice(0, 10).map(item => `
                <div class="flex justify-between items-center p-4 bg-white rounded-2xl mb-2 shadow-sm border border-slate-50">
                    <div>
                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">
                           ${new Date(item.timestamp).toLocaleDateString('th-TH')}
                        </p>
                        <p class="font-bold text-slate-700">${userLogin === 'admin' ? item.name : 'คุณ'} - ${item.type}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold ${item.type === 'เข้างาน' ? 'text-emerald-500' : 'text-rose-500'}">
                            ${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}
                        </p>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error(error);
            container.innerHTML = '<p class="text-center text-red-400 py-4">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p>';
        }
    }

    async function recordTime(action) {
        // เพิ่ม Loading ระหว่างรอ
        const container = document.getElementById('historyList');
        container.innerHTML = '<p class="text-center text-indigo-500 py-4 animate-pulse">กำลังบันทึก...</p>';
        
        try {
            const res = await fetch(`${SCRIPT_URL}?action=${action}&user=${userLogin}`);
            const result = await res.json();
            if(result.status === "success") {
                loadHistory(); // บันทึกเสร็จแล้วโหลดข้อมูลใหม่ทันที
            }
        } catch (e) {
            alert("บันทึกล้มเหลว กรุณาลองใหม่");
            loadHistory();
        }
    }
    
    // เรียกโหลดข้อมูลตอนเปิดหน้า
    window.onload = loadHistory;
</script>
</body>
</html>
