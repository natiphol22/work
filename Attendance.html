<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus | Executive Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --emerald: #10b981;
            --rose: #f43f5e;
        }
        body { 
            font-family: 'Kanit', sans-serif;
            background: #f8fafc;
            overflow-x: hidden;
        }
        .aura-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #eff6ff 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #f5f3ff 0%, transparent 50%),
                        radial-gradient(circle at 100% 0%, #f0fdf4 0%, transparent 50%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03);
        }
        .action-btn {
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }
        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .action-btn:active::after { width: 300%; height: 300%; }
        .action-btn:hover { transform: translateY(-4px); }
        
        .pulse-emerald { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); animation: pulse-e 2s infinite; }
        @keyframes pulse-e { 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-modal { animation: modalShow 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">
    <div class="aura-bg"></div>

    <div class="w-full max-w-xl space-y-8">
        <!-- Top Profile & Brand -->
        <div class="flex justify-between items-end px-2">
            <div>
                <p id="greetingText" class="text-slate-400 text-sm font-light tracking-wide italic">Good Morning,</p>
                <h1 id="userNameDisplay" class="text-3xl font-semibold text-slate-800 tracking-tight leading-none">CubicPlus User</h1>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center gap-2 bg-white/80 border border-white px-4 py-2 rounded-2xl shadow-sm glass-panel">
                    <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                    <span id="statusText" class="text-xs font-bold text-slate-500 uppercase tracking-widest">Offline</span>
                </div>
            </div>
        </div>

        <!-- Main Display -->
        <div class="glass-panel rounded-[3.5rem] p-12 text-center relative overflow-hidden">
            <div class="relative z-10">
                <h2 id="clock" class="text-8xl font-extralight text-slate-800 tracking-tighter mb-4">00:00</h2>
                <p id="dateText" class="text-indigo-500/80 font-medium tracking-[0.3em] uppercase text-xs mb-12"></p>

                <!-- Dual Actions -->
                <div class="flex gap-6 justify-center">
                    <button id="btnCheckIn" onclick="recordTime('checkIn')" class="action-btn w-full max-w-[180px] py-6 bg-slate-900 text-white rounded-[2rem] shadow-2xl shadow-indigo-200 flex flex-col items-center gap-2 group">
                        <i data-lucide="shield-check" class="w-6 h-6 text-emerald-400 group-hover:scale-110 transition-transform"></i>
                        <span class="text-xs font-medium tracking-widest uppercase">Check In</span>
                    </button>
                    <button id="btnCheckOut" onclick="recordTime('checkOut')" class="action-btn w-full max-w-[180px] py-6 bg-white text-slate-900 border border-slate-100 rounded-[2rem] shadow-xl flex flex-col items-center gap-2 group">
                        <i data-lucide="log-out" class="w-6 h-6 text-rose-500 group-hover:scale-110 transition-transform"></i>
                        <span class="text-xs font-medium tracking-widest uppercase text-slate-400">Check Out</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Insight Row -->
        <div class="grid grid-cols-2 gap-6">
            <div class="glass-panel p-6 rounded-[2.5rem] flex flex-col items-center justify-center space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Arrival</p>
                <p id="lastIn" class="text-xl font-medium text-slate-700">--:--</p>
                <div class="w-8 h-1 bg-emerald-400/20 rounded-full"></div>
            </div>
            <div class="glass-panel p-6 rounded-[2.5rem] flex flex-col items-center justify-center space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Departure</p>
                <p id="lastOut" class="text-xl font-medium text-slate-700">--:--</p>
                <div class="w-8 h-1 bg-rose-400/20 rounded-full"></div>
            </div>
        </div>

        <!-- The Journal (Activity History) -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-4">
                <h3 class="text-lg font-semibold text-slate-800 tracking-tight">Today's Journal</h3>
                <button onclick="loadPersonalToday()" class="text-indigo-500 p-2 hover:bg-indigo-50 rounded-full transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="personalHistory" class="space-y-4 px-2">
                <div class="py-10 text-center opacity-20"><i data-lucide="loader" class="animate-spin mx-auto"></i></div>
            </div>
        </div>

        <p class="text-center text-[10px] text-slate-300 font-medium tracking-[0.5em] uppercase">Secured by CubicPlus Enterprise</p>
    </div>

    <!-- Quick Memo Modal -->
    <div id="memoModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeMemo()"></div>
        <div class="glass-panel w-full max-w-sm rounded-[3rem] p-8 relative z-10 shadow-2xl animate-modal">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="pen-tool"></i>
                </div>
                <h3 class="text-xl font-semibold text-slate-800">Daily Summary</h3>
                <p class="text-xs text-slate-400 mt-1 font-light tracking-wide">วันนี้คุณทำอะไรสำเร็จบ้าง?</p>
            </div>
            
            <textarea id="memoInput" rows="4" 
                class="w-full bg-slate-50/50 border border-slate-100 rounded-[1.5rem] p-4 text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all resize-none mb-2"
                placeholder="ระบุสั้นๆ เพื่อแจ้ง Admin..."></textarea>
            
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button onclick="closeMemo()" class="py-4 text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-colors">Skip</button>
                <button onclick="submitWithMemo()" class="py-4 bg-slate-900 text-white rounded-[1.25rem] text-xs font-bold uppercase tracking-widest shadow-lg shadow-indigo-100 active:scale-95 transition-transform">Submit</button>
            </div>
        </div>
    </div>

    <script>
        // *** แก้ไข URL ของ Google Apps Script ของคุณที่นี่ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE_zj0ZjtsrGZprhQwQI8uyg8AUe264I5p8g4ForxVv4ODrYMlFIWNsEbJXxZnjLOfBw/exec";
        
        const userLogin = localStorage.getItem('userLogin') || "Administrator";
        document.getElementById('userNameDisplay').innerText = userLogin;

        // --- Clock & Greeting ---
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            let greet = "Good Evening,";
            if(hours < 12) greet = "Good Morning,";
            else if(hours < 17) greet = "Good Afternoon,";
            document.getElementById('greetingText').innerText = greet;
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('dateText').innerText = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Record Time Logic ---
        function recordTime(action) {
            if (action === 'checkOut') {
                document.getElementById('memoModal').classList.remove('hidden');
                document.getElementById('memoInput').focus();
                lucide.createIcons();
                return;
            }
            executeRecord('checkIn', "");
        }

        function closeMemo() {
            document.getElementById('memoModal').classList.add('hidden');
            // กรณี Skip จะส่งค่า Memo เป็นช่องว่าง
            executeRecord('checkOut', "");
        }

        function submitWithMemo() {
            const memo = document.getElementById('memoInput').value;
            document.getElementById('memoModal').classList.add('hidden');
            executeRecord('checkOut', memo);
            document.getElementById('memoInput').value = ""; // เคลียร์ค่า
        }

        async function executeRecord(action, memo) {
            const btn = action === 'checkIn' ? document.getElementById('btnCheckIn') : document.getElementById('btnCheckOut');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto text-indigo-400"></i>`;
            lucide.createIcons();

            try {
                // ส่งพารามิเตอร์ memo ไปพร้อมกับ request
                const response = await fetch(`${SCRIPT_URL}?action=${action}&user=${encodeURIComponent(userLogin)}&memo=${encodeURIComponent(memo)}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    loadPersonalToday();
                } else {
                    alert(data.message || "เกิดข้อผิดพลาด");
                }
            } catch (e) {
                alert("Synchronization Error: ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }

        // --- History Loader ---
        async function loadPersonalToday() {
            const container = document.getElementById('personalHistory');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=${encodeURIComponent(userLogin)}`);
                const data = await res.json();
                const todayStr = new Date().toDateString();
                
                // กรองเฉพาะของวันนี้
                const todayData = data.filter(item => new Date(item.timestamp).toDateString() === todayStr);

                if (!todayData.length) {
                    container.innerHTML = `<div class="text-center py-10 text-slate-300 text-xs italic font-light tracking-widest uppercase">No Journal Entries Found Today</div>`;
                    document.getElementById('lastIn').innerText = "--:--";
                    document.getElementById('lastOut').innerText = "--:--";
                    return;
                }

                container.innerHTML = todayData.map(item => {
                    const isIn = item.type.includes('เข้า');
                    return `
                        <div class="glass-panel p-5 rounded-[2rem] flex justify-between items-center group hover:bg-white transition-all">
                            <div class="flex items-center gap-5">
                                <div class="w-12 h-12 rounded-2xl ${isIn ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'} flex items-center justify-center shadow-sm">
                                    <i data-lucide="${isIn ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-slate-700">${item.type}</h4>
                                    ${item.memo ? `<p class="text-[11px] text-indigo-500 bg-indigo-50/50 px-3 py-1 rounded-full mt-1 inline-block font-medium">📝 ${item.memo}</p>` : `<p class="text-[9px] text-slate-400 font-bold tracking-tighter uppercase">Cloud Synced • Verified</p>`}
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-semibold text-slate-800 leading-none">${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</p>
                                <span class="text-[9px] text-indigo-400 font-bold uppercase tracking-widest">GMT+7</span>
                            </div>
                        </div>
                    `;
                }).join('');

                // Update Stats
                const ins = todayData.filter(i => i.type.includes('เข้า'));
                const outs = todayData.filter(i => i.type.includes('ออก'));
                
                // แก้ไขการแสดงเวลาล่าสุด (เอาค่าจากอันแรกของอาเรย์ที่เรียงใหม่แล้ว)
                if(ins.length) document.getElementById('lastIn').innerText = new Date(ins[ins.length-1].timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
                if(outs.length) document.getElementById('lastOut').innerText = new Date(outs[0].timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});

                // Update Status Bar
                const statusIndicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                if(todayData[0] && todayData[0].type.includes('เข้า')) {
                    statusIndicator.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 pulse-emerald";
                    statusText.innerText = "Online - Working";
                    statusText.className = "text-xs font-bold text-emerald-600 uppercase tracking-widest";
                } else {
                    statusIndicator.className = "w-2.5 h-2.5 rounded-full bg-slate-300";
                    statusText.innerText = "Offline";
                    statusText.className = "text-xs font-bold text-slate-500 uppercase tracking-widest";
                }
                lucide.createIcons();
            } catch (e) {
                container.innerHTML = `<p class="text-center text-xs text-rose-400">Failed to synchronize journal</p>`;
            }
        }

        window.onload = () => { loadPersonalToday(); lucide.createIcons(); };
    </script>
</body>
</html>
