<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CubicPlus | Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="p-4 bg-slate-50 font-['Kanit'] flex flex-col items-center justify-center min-h-screen">
    <div class="w-full max-w-md space-y-6">
        <div class="bg-white rounded-[2.5rem] p-10 text-center shadow-xl">
            <h1 id="clock" class="text-5xl font-bold text-slate-800 mb-2">00:00:00</h1>
            <p id="dateText" class="text-slate-400 text-xs mb-8"></p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="recordTime('checkIn')" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold hover:scale-105 transition-transform">CHECK IN</button>
                <button onclick="recordTime('checkOut')" class="py-4 bg-rose-500 text-white rounded-2xl font-bold hover:scale-105 transition-transform">CHECK OUT</button>
            </div>
        </div>
        <div class="bg-white rounded-[2.5rem] p-6 shadow-xl">
            <h3 class="font-bold mb-4 flex items-center gap-2"><span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> ประวัติวันนี้</h3>
            <div id="personalHistory" class="space-y-3 text-sm text-slate-400 text-center">กำลังโหลด...</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs6htf33iNyVvOmL88GnAHzzEK665A4Mw6Z9gOWXVpxD0LfDEqqEagDlkRhovPC5KC_g/exec";
        const userLogin = localStorage.getItem('userLogin') || "guest";

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH');
            document.getElementById('dateText').innerText = now.toLocaleDateString('th-TH', { weekday:'long', day:'numeric', month:'long' });
        }
        setInterval(updateClock, 1000);

        async function recordTime(action) {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=${action}&user=${userLogin}`);
                const data = await res.json();
                alert(data.status === "success" ? "บันทึกสำเร็จ" : data.message);
                loadPersonalToday();
            } catch (e) { alert("เชื่อมต่อล้มเหลว"); }
        }

        async function loadPersonalToday() {
            const container = document.getElementById('personalHistory');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=${userLogin}`);
                const data = await res.json();
                const today = new Date().toDateString();
                const todayData = data.filter(item => new Date(item.timestamp).toDateString() === today);

                container.innerHTML = todayData.length ? todayData.map(item => `
                    <div class="flex justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <span class="font-bold text-slate-600">${item.type}</span>
                        <span class="text-indigo-600 font-bold">${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})} น.</span>
                    </div>
                `).join('') : "ยังไม่มีข้อมูลวันนี้";
            } catch (e) { container.innerHTML = "โหลดข้อมูลไม่สำเร็จ"; }
        }
        window.onload = loadPersonalToday;
    </script>
</body>
</html>
