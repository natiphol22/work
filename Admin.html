<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="p-6 bg-slate-50 font-['Kanit']">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Attendance Report</h1>
            <div class="flex gap-2">
                <input type="month" id="filterMonth" onchange="loadAdminData()" class="p-2 rounded-xl border-none shadow-sm">
                <input type="text" id="filterUser" placeholder="ชื่อพนักงาน..." onkeyup="loadAdminData()" class="p-2 rounded-xl border-none shadow-sm">
            </div>
        </header>

        <div id="adminContent" class="grid grid-cols-1 gap-4">
             <!-- ส่วนแสดงผลเหมือนที่คุณทำไว้ (Table) -->
             <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="p-5">วันที่</th>
                            <th class="p-5">ชื่อ</th>
                            <th class="p-5">ประเภท</th>
                            <th class="p-5">เวลา</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-50"></tbody>
                </table>
             </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3zhvuLCfMJlKmCVgWBXLays-RfYsvvOdk07U8j7mlCGtT4SHyt_ubF9hmlxtFzycgNg/exec";

        async function loadAdminData() {
            const month = document.getElementById('filterMonth').value;
            const target = document.getElementById('filterUser').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=admin&month=${month}&targetUser=${target}`);
                const data = await res.json();
                document.getElementById('tbody').innerHTML = data.reverse().map(item => `
                    <tr>
                        <td class="p-5 text-sm">${new Date(item.timestamp).toLocaleDateString('th-TH')}</td>
                        <td class="p-5 font-bold">${item.name}</td>
                        <td class="p-5"><span class="${item.type==='เข้างาน'?'text-emerald-500':'text-rose-500'}">${item.type}</span></td>
                        <td class="p-5 font-bold text-indigo-600">${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        window.onload = () => {
            document.getElementById('filterMonth').value = new Date().toISOString().slice(0, 7);
            loadAdminData();
        };
    </script>
</body>
</html>
