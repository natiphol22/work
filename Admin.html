<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CubicPlus | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; color: #1e293b; }
        .admin-card { background: white; border-radius: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #edf2f7; }
        .loading-overlay { background: rgba(255,255,255,0.7); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Attendance Report</h1>
                <p class="text-slate-500">จัดการและตรวจสอบการลงเวลาพนักงาน</p>
            </div>
            <div class="flex flex-wrap gap-3 w-full md:w-auto">
                <input type="month" id="filterMonth" onchange="loadAdminData()" class="p-3 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 flex-1">
                <input type="text" id="filterUser" placeholder="ค้นหาชื่อพนักงาน..." onkeyup="loadAdminData()" class="p-3 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 flex-1">
            </div>
        </header>

        <!-- Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="admin-card p-6 border-l-4 border-indigo-500">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-wider">รายการทั้งหมด</p>
                <h2 id="statTotal" class="text-3xl font-bold">0</h2>
            </div>
            <div class="admin-card p-6 border-l-4 border-emerald-500">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-wider">เข้างาน (In)</p>
                <h2 id="statIn" class="text-3xl font-bold text-emerald-600">0</h2>
            </div>
            <div class="admin-card p-6 border-l-4 border-rose-500">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-wider">ออกงาน (Out)</p>
                <h2 id="statOut" class="text-3xl font-bold text-rose-600">0</h2>
            </div>
        </div>

        <!-- Data Table -->
        <div class="admin-card overflow-hidden relative">
            <!-- Loading Indicator -->
            <div id="loader" class="hidden absolute inset-0 loading-overlay flex items-center justify-center z-10">
                <span class="text-indigo-600 font-bold">กำลังอัปเดตข้อมูล...</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase">วันที่</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase">ชื่อพนักงาน</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase">ประเภท</th>
                            <th class="p-5 text-xs font-bold text-slate-400 uppercase">เวลา</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody" class="divide-y divide-slate-50">
                        <!-- ข้อมูลจะโหลดตรงนี้ -->
                    </tbody>
                </table>
            </div>
            <div id="noData" class="hidden p-20 text-center text-slate-400">ไม่พบข้อมูลที่ค้นหา</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_aywI6OA5Bv7qfduMDfSVGghhAjuCPKHHd4Ss8M3pB_LK9svWgmAU-MEC51lb1fEP7w/exec";

        async function loadAdminData() {
            const month = document.getElementById('filterMonth').value;
            const user = document.getElementById('filterUser').value;
            const tbody = document.getElementById('adminTableBody');
            const loader = document.getElementById('loader');
            
            loader.classList.remove('hidden');
            
            try {
                // ปรับการ fetch ให้รองรับ CORS Redirect ของ Google Apps Script
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&user=admin&month=${month}&targetUser=${encodeURIComponent(user)}`);
                
                if (!res.ok) throw new Error('Network response was not ok');
                
                const data = await res.json();
                
                // อัปเดตสถิติ
                document.getElementById('statTotal').innerText = data.length;
                document.getElementById('statIn').innerText = data.filter(d => d.type === 'เข้างาน').length;
                document.getElementById('statOut').innerText = data.filter(d => d.type === 'ออกงาน').length;

                if (data.length === 0) {
                    tbody.innerHTML = "";
                    document.getElementById('noData').classList.remove('hidden');
                } else {
                    document.getElementById('noData').classList.add('hidden');
                    tbody.innerHTML = data.reverse().map(item => `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="p-5 text-sm">${new Date(item.timestamp).toLocaleDateString('th-TH')}</td>
                            <td class="p-5 font-bold text-slate-700">${item.name}</td>
                            <td class="p-5">
                                <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${item.type === 'เข้างาน' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                    ${item.type}
                                </span>
                            </td>
                            <td class="p-5 font-bold text-indigo-600">${new Date(item.timestamp).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})} น.</td>
                        </tr>
                    `).join('');
                }
            } catch (e) { 
                console.error("Error loading admin data:", e);
                tbody.innerHTML = `<tr><td colspan="4" class="p-5 text-center text-red-500">ไม่สามารถดึงข้อมูลได้ (โปรดตรวจสอบการ Deploy ของ Google Script)</td></tr>`;
            } finally {
                loader.classList.add('hidden');
            }
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('filterMonth').value = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
            loadAdminData();
        };
    </script>
</body>
</html>
