<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus | Admin Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card-neo { background: white; border: 1px solid #f1f5f9; border-radius: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02); }
        tr:hover { background-color: #fcfdfe; }
        /* สไตล์เพิ่มเติมสำหรับปุ่มและฟิลด์ */
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="glass-header sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100">
                    <i data-lucide="settings" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 leading-none">Admin Control</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest font-medium">CubicPlus Management</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <button onclick="toggleSettings()" class="p-2.5 bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors flex items-center gap-2 text-sm text-slate-600">
                    <i data-lucide="clock-cog" class="w-4 h-4"></i> ตั้งเวลา
                </button>
                <button onclick="exportToCSV()" class="px-4 py-2.5 bg-emerald-500 text-white rounded-2xl hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-100 text-sm font-medium flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Export
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6">
        
        <!-- Settings Panel -->
        <div id="settingsPanel" class="hidden mb-8 grid grid-cols-1 md:grid-cols-2 gap-6 animate-modal">
            <div class="bg-indigo-900 rounded-[2.5rem] p-8 text-white shadow-xl shadow-indigo-100">
                <div class="flex items-center gap-3 mb-6">
                    <i data-lucide="alarm-clock" class="text-indigo-300"></i>
                    <h2 class="font-bold tracking-tight">กำหนดเวลามาตรฐาน</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-indigo-300 font-bold">เวลาเข้างาน</label>
                        <input type="time" id="configIn" value="09:00" onchange="renderTable()" class="w-full mt-2 bg-indigo-800 border-none rounded-2xl p-3 text-white focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest text-indigo-300 font-bold">เวลาเลิกงาน</label>
                        <input type="time" id="configOut" value="18:00" onchange="renderTable()" class="w-full mt-2 bg-indigo-800 border-none rounded-2xl p-3 text-white focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 flex flex-col justify-center">
                <p class="text-sm text-slate-500 leading-relaxed">
                    <span class="font-bold text-indigo-600">Tip:</span> ระบบจะใช้ค่าเหล่านี้ในการประมวลผลสถานะ <br>
                    - เข้างานหลัง <span class="inTimeText font-bold text-slate-700">09:00</span> = <span class="text-rose-500 font-bold">สาย</span> <br>
                    - ออกงานก่อน <span class="outTimeText font-bold text-slate-700">18:00</span> = <span class="text-amber-500 font-bold">กลับก่อน</span>
                </p>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-1">
                <i data-lucide="calendar" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="month" id="filterMonth" onchange="loadAdminData()" class="w-full pl-12 pr-4 py-4 rounded-3xl border border-slate-100 bg-white text-sm focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all">
            </div>
            <div class="relative flex-[2]">
                <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="filterUser" placeholder="ค้นหาชื่อพนักงาน..." onkeyup="loadAdminData()" class="w-full pl-12 pr-4 py-4 rounded-3xl border border-slate-100 bg-white text-sm focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all">
            </div>
        </div>

        <div class="card-neo overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="p-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest">ข้อมูลเวลา</th>
                            <th class="p-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest">พนักงาน</th>
                            <th class="p-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest text-center">สถานะ</th>
                            <th class="p-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest">สรุปงาน</th>
                            <th class="p-6 text-right text-[11px] font-bold text-slate-400 uppercase tracking-widest text-slate-300 italic">Auth</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
            <div id="loader" class="py-20 text-center hidden"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto text-indigo-500"></i></div>
        </div>
    </div>

    <!-- Popup Modal -->
    <div id="popupModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closePopup()"></div>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 relative z-10 shadow-2xl transition-all">
            <div id="popupUser" class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.3em] mb-4"></div>
            <div id="popupText" class="text-slate-600 text-base leading-relaxed whitespace-pre-wrap max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closePopup()" class="w-full mt-10 py-4 bg-indigo-600 text-white rounded-2xl text-xs font-bold uppercase tracking-widest hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-100">เข้าใจแล้ว</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE_zj0ZjtsrGZprhQwQI8uyg8AUe264I5p8g4ForxVv4ODrYMlFIWNsEbJXxZnjLOfBw/exec";
        let currentData = [];

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('hidden');
        }

        async function loadAdminData() {
            const month = document.getElementById('filterMonth').value;
            const target = document.getElementById('filterUser').value;
            const tbody = document.getElementById('tbody');
            const loader = document.getElementById('loader');
            
            tbody.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory&role=admin&month=${month}&targetUser=${target}`);
                currentData = await res.json(); // เก็บข้อมูลดิบ
                loader.classList.add('hidden');
                renderTable(); // เรียกฟังก์ชันแสดงผลแยกออกมา
            } catch (e) { 
                loader.classList.add('hidden');
                console.error(e);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tbody');
            const configIn = document.getElementById('configIn').value;
            const configOut = document.getElementById('configOut').value;
            
            // อัปเดตข้อความ Tip
            document.querySelectorAll('.inTimeText').forEach(el => el.innerText = configIn);
            document.querySelectorAll('.outTimeText').forEach(el => el.innerText = configOut);

            if (!currentData || currentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400 font-light">ไม่พบข้อมูล</td></tr>`;
                return;
            }

            // ใช้สำเนา Array เพื่อ Reverse ป้องกันลำดับข้อมูลจริงเพี้ยน
            tbody.innerHTML = [...currentData].reverse().map(item => {
                const dateObj = new Date(item.timestamp);
                const isCheckIn = item.type.includes('เข้า');
                const [confInH, confInM] = configIn.split(':').map(Number);
                const [confOutH, confOutM] = configOut.split(':').map(Number);
                
                let timeColor = 'text-slate-700';
                let statusLabel = item.type;
                
                if (isCheckIn) {
                    if (dateObj.getHours() > confInH || (dateObj.getHours() === confInH && dateObj.getMinutes() > confInM)) {
                        timeColor = 'text-rose-500';
                        statusLabel += ' (สาย)';
                    }
                } else {
                    if (dateObj.getHours() < confOutH || (dateObj.getHours() === confOutH && dateObj.getMinutes() < confOutM)) {
                        timeColor = 'text-amber-500';
                        statusLabel += ' (กลับก่อน)';
                    }
                }

                // Clean data สำหรับส่งเข้า function popup
                const safeMemo = item.memo ? item.memo.replace(/[`'"]/g, " ").replace(/\n/g, "\\n") : "";

                return `
                    <tr>
                        <td class="p-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-bold text-slate-400 tracking-wider mb-1">${dateObj.toLocaleDateString('th-TH', {day:'2-digit', month:'short', year:'2-digit'})}</span>
                                <span class="text-xl font-bold ${timeColor}">${dateObj.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                        </td>
                        <td class="p-6 text-sm font-semibold text-slate-700">${item.name}</td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest ${isCheckIn ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'}">
                                ${statusLabel}
                            </span>
                        </td>
                        <td class="p-6">
                            ${item.memo ? `<button onclick="openPopup('${item.name}', \`${safeMemo}\`)" class="flex items-center gap-2 bg-indigo-50 text-indigo-600 px-4 py-2 rounded-2xl text-xs font-medium hover:bg-indigo-100 transition-all">📝 อ่านสรุปงาน</button>` : '<span class="text-[10px] text-slate-300 font-bold italic">ไม่มีบันทึก</span>'}
                        </td>
                        <td class="p-6 text-right"><i data-lucide="check-circle-2" class="w-4 h-4 text-slate-200 ml-auto"></i></td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        function openPopup(user, text) {
            document.getElementById('popupUser').innerText = "Update By: " + user;
            document.getElementById('popupText').innerText = text;
            document.getElementById('popupModal').classList.remove('hidden');
        }

        function closePopup() { 
            document.getElementById('popupModal').classList.add('hidden'); 
        }

        function exportToCSV() {
            if (currentData.length === 0) return alert("ไม่มีข้อมูล");
            const headers = ["วันที่", "ชื่อ", "ประเภท", "สรุปงาน"];
            const csvContent = "\uFEFF" + [headers.join(","), ...currentData.map(row => [
                new Date(row.timestamp).toLocaleString('th-TH'), 
                row.name, 
                row.type, 
                `"${(row.memo || '').replace(/"/g, '""')}"`
            ].join(","))].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `CubicPlus_Report_${document.getElementById('filterMonth').value}.csv`;
            link.click();
        }

        window.onload = () => {
            const now = new Date();
            document.getElementById('filterMonth').value = now.getFullYear() + "-" + ("0" + (now.getMonth() + 1)).slice(-2);
            loadAdminData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
