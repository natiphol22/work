<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubicPlus | ระบบจัดการหลังบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fcfdfe; color: #334155; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid #f1f5f9; }
        
        @keyframes shimmer { 0% { background-position: -450px 0; } 100% { background-position: 450px 0; } }
        .skeleton {
            background: linear-gradient(to right, #f1f5f9 8%, #f8fafc 18%, #f1f5f9 33%);
            background-size: 800px 104px;
            animation: shimmer 1.5s infinite linear;
            border-radius: 1.5rem;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .neo-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .neo-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        
        .tab-active { background: #4f46e5; color: white !important; box-shadow: 0 8px 15px -3px rgba(79, 70, 229, 0.4); }
        .nav-active { color: #4f46e5 !important; font-weight: 600; border-bottom: 2px solid #4f46e5; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="fullLoader" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="spinner mb-4"></div>
        <p id="loadingText" class="text-slate-500 text-sm font-medium animate-pulse">กำลังโหลดข้อมูลระบบ...</p>
    </div>

    <nav class="glass-header sticky top-0 z-50 px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                        <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 leading-none">CubicPlus</h1>
                        <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">ระบบหลังบ้าน</p>
                    </div>
                </div>
                
                <div class="hidden md:flex items-center gap-8 h-full">
                    <button onclick="switchMainTab('attendance')" id="nav-attendance" class="nav-active text-slate-400 text-sm flex items-center gap-2 py-2 transition-all">
                        <i data-lucide="calendar-check" class="w-4 h-4"></i> ลงเวลางาน
                    </button>
                    <button onclick="switchMainTab('leaves')" id="nav-leaves" class="text-slate-400 text-sm flex items-center gap-2 py-2 transition-all relative">
                        <i data-lucide="plane" class="w-4 h-4"></i> อนุมัติการลา
                        <span id="leaveBadge" class="hidden absolute -top-1 -right-4 bg-rose-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">0</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleSettings()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-400 hover:text-indigo-600 transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <button onclick="exportToCSV()" class="px-5 py-2.5 bg-emerald-500 text-white rounded-xl text-sm font-semibold hover:bg-emerald-600 transition-all flex items-center gap-2 shadow-lg shadow-emerald-100">
                    <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">ส่งออกข้อมูล</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div id="attendanceFilters" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 mb-10 fade-in">
            <div class="flex bg-slate-100 p-1 rounded-2xl h-fit">
                <button id="viewWeek" onclick="setView('week')" class="tab-active flex-1 py-2.5 rounded-xl text-xs font-bold transition-all">สัปดาห์นี้</button>
                <button id="viewMonth" onclick="setView('month')" class="flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all">รายเดือน</button>
            </div>

            <div class="relative">
                <i data-lucide="users" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <select id="userFilter" onchange="renderData()" class="w-full pl-12 pr-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium outline-none appearance-none focus:ring-4 focus:ring-indigo-500/5 transition-all">
                    <option value="">พนักงานทุกคน</option>
                </select>
            </div>

            <div class="relative">
                <i data-lucide="list-filter" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <select id="typeFilter" onchange="renderData()" class="w-full pl-12 pr-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium outline-none appearance-none focus:ring-4 focus:ring-indigo-500/5 transition-all">
                    <option value="all">ทุกประเภทรายการ</option>
                    <option value="เข้างาน">เฉพาะ "เข้างาน"</option>
                    <option value="ออกงาน">เฉพาะ "ออกงาน"</option>
                </select>
            </div>

            <div class="relative">
                <i data-lucide="map-pin" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <select id="locFilter" onchange="renderData()" class="w-full pl-12 pr-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-medium outline-none appearance-none focus:ring-4 focus:ring-indigo-500/5 transition-all text-indigo-600 font-bold">
                    <option value="all">ทุกสถานที่</option>
                    <option value="office">ออฟฟิศ (OFFICE)</option>
                    <option value="on-site">ON-SITE</option>
                    <option value="wfh">WFH</option>
                </select>
            </div>

            <div id="monthContainer" class="hidden">
                <input type="month" id="monthInput" onchange="renderData()" class="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all">
            </div>
        </div>

        <div id="skeleton" class="space-y-8">
            <div class="h-6 w-48 skeleton"></div>
            <div class="grid grid-cols-1 gap-4">
                <div class="h-24 skeleton"></div>
                <div class="h-24 skeleton"></div>
                <div class="h-24 skeleton"></div>
            </div>
        </div>

        <div id="mainContent" class="hidden space-y-10 fade-in">
            <div id="attendanceSection" class="space-y-10"></div>

            <div id="leaveSection" class="hidden space-y-6">
                <h2 class="text-xl font-bold text-slate-900 border-l-4 border-indigo-600 pl-4 py-1">รายการรออนุมัติการลา</h2>
                <div id="leaveList" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>

    </main>

    <div id="memoModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 md:p-10 relative z-10 shadow-2xl">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="memoName" class="text-xl font-bold text-slate-900 leading-tight"></h3>
                    <p id="memoType" class="text-[10px] text-indigo-500 font-black uppercase tracking-widest mt-1"></p>
                </div>
                <button onclick="closeMemo()" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full hover:bg-rose-100 transition-all">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div id="memoBody" class="text-slate-600 text-sm leading-relaxed p-6 bg-slate-50 rounded-3xl min-h-[120px] whitespace-pre-wrap border border-slate-100"></div>
            <button onclick="closeMemo()" class="w-full mt-8 py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:bg-slate-800 transition-all">ตกลง</button>
        </div>
    </div>

    <div id="settingsPanel" class="hidden fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-slate-900">ตั้งค่าเวลาทำงาน</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-400">เวลาเข้างานมาตรฐาน</label>
                    <input type="time" id="cfgIn" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none mt-1">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-slate-400">เวลาเลิกงานมาตรฐาน</label>
                    <input type="time" id="cfgOut" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none mt-1">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="toggleSettings()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold text-sm">ยกเลิก</button>
                <button onclick="saveAdminSettings()" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold text-sm">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzE_zj0ZjtsrGZprhQwQI8uyg8AUe264I5p8g4ForxVv4ODrYMlFIWNsEbJXxZnjLOfBw/exec";
        let rawHistory = [];
        let leaveHistory = [];
        let currentView = 'week';

        async function init() {
            document.getElementById('cfgIn').value = localStorage.getItem('cubic_cfg_in') || '09:00';
            document.getElementById('cfgOut').value = localStorage.getItem('cubic_cfg_out') || '18:00';
            lucide.createIcons();

            try {
                const userRes = await fetch(`${SCRIPT_URL}?action=getUsers`);
                const users = await userRes.json();
                const select = document.getElementById('userFilter');
                users.filter(u => u.trim().toLowerCase() !== 'admin').forEach(u => select.add(new Option(u, u)));

                const res = await fetch(`${SCRIPT_URL}?action=getHistory&role=admin`);
                const data = await res.json();
                
                // Separate Attendance and Leaves (Assumes leave types contain 'ลา')
                rawHistory = data.filter(item => item.name.trim().toLowerCase() !== 'admin' && !item.type.includes('ลา'));
                leaveHistory = data.filter(item => item.name.trim().toLowerCase() !== 'admin' && item.type.includes('ลา') && item.status === 'รออนุมัติ');

                document.getElementById('fullLoader').classList.add('hidden');
                document.getElementById('skeleton').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                updateLeaveBadge();
                renderData();
            } catch (e) {
                console.error("Init Error:", e);
                alert("เกิดข้อผิดพลาดในการโหลดข้อมูล");
            }
        }

        // Tab Switching Logic
        function switchMainTab(tab) {
            const attendSection = document.getElementById('attendanceSection');
            const leaveSection = document.getElementById('leaveSection');
            const attendFilters = document.getElementById('attendanceFilters');
            const navAttend = document.getElementById('nav-attendance');
            const navLeave = document.getElementById('nav-leaves');

            if (tab === 'leaves') {
                attendSection.classList.add('hidden');
                attendFilters.classList.add('hidden');
                leaveSection.classList.remove('hidden');
                navLeave.classList.add('nav-active');
                navAttend.classList.remove('nav-active');
                renderLeaves();
            } else {
                attendSection.classList.remove('hidden');
                attendFilters.classList.remove('hidden');
                leaveSection.classList.add('hidden');
                navAttend.classList.add('nav-active');
                navLeave.classList.remove('nav-active');
                renderData();
            }
            lucide.createIcons();
        }

        function updateLeaveBadge() {
            const badge = document.getElementById('leaveBadge');
            if (leaveHistory.length > 0) {
                badge.innerText = leaveHistory.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // --- Render Functions (Attendance) ---
        function renderData() {
            const container = document.getElementById('attendanceSection');
            const userFilter = document.getElementById('userFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const locFilter = document.getElementById('locFilter').value.toLowerCase();
            const monthInput = document.getElementById('monthInput').value;
            const cfgIn = document.getElementById('cfgIn').value;
            const cfgOut = document.getElementById('cfgOut').value;

            let filtered = [...rawHistory];
            if (userFilter) filtered = filtered.filter(d => d.name === userFilter);
            if (typeFilter !== 'all') filtered = filtered.filter(d => d.type === typeFilter);
            if (locFilter !== 'all') filtered = filtered.filter(d => d.memo.toLowerCase().includes(locFilter));
            
            if (currentView === 'week') {
                const limit = new Date(); limit.setDate(limit.getDate() - 7);
                filtered = filtered.filter(d => new Date(d.timestamp) >= limit);
            } else if (monthInput) {
                filtered = filtered.filter(d => d.timestamp.startsWith(monthInput));
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-300 italic">ไม่พบประวัติการทำรายการ</div>`;
                return;
            }

            const groups = filtered.reduce((acc, curr) => {
                const dateKey = new Date(curr.timestamp).toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                if (!acc[dateKey]) acc[dateKey] = [];
                acc[dateKey].push(curr);
                return acc;
            }, {});

            container.innerHTML = Object.keys(groups).map(date => `
                <div class="space-y-4">
                    <h2 class="text-sm font-bold text-slate-900 border-l-4 border-indigo-600 pl-4 py-1">${date}</h2>
                    <div class="grid grid-cols-1 gap-3">${groups[date].map(item => renderRow(item, cfgIn, cfgOut)).join('')}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderRow(item, cfgIn, cfgOut) {
            const date = new Date(item.timestamp);
            const timeStr = date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            const isCheckIn = item.type === 'เข้างาน';
            let badge = '';
            let timeColor = 'text-slate-900';
            const [refH, refM] = (isCheckIn ? cfgIn : cfgOut).split(':').map(Number);
            const actualH = date.getHours(), actualM = date.getMinutes();

            if (isCheckIn && (actualH > refH || (actualH === refH && actualM > refM))) {
                badge = `<span class="px-2 py-0.5 bg-rose-50 text-rose-500 text-[9px] font-bold rounded border border-rose-100">สาย</span>`;
                timeColor = 'text-rose-600';
            } else if (!isCheckIn && (actualH < refH || (actualH === refH && actualM < refM))) {
                badge = `<span class="px-2 py-0.5 bg-amber-50 text-amber-500 text-[9px] font-bold rounded border border-amber-100">กลับก่อน</span>`;
                timeColor = 'text-amber-600';
            }

            const locMatch = item.memo.match(/Location:\s*([^\n\r]+)/i);
            const location = locMatch ? locMatch[1].toUpperCase() : 'OFFICE';
            const memoBody = item.memo.replace(/Location:[^\n\r]+/i, '').trim();

            return `
                <div class="neo-card bg-white p-4 md:p-5 rounded-3xl flex flex-col md:flex-row md:items-center gap-4">
                    <div class="flex items-center gap-4 flex-1">
                        <div class="w-12 h-12 rounded-2xl ${isCheckIn ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-50 text-slate-400'} flex items-center justify-center">
                            <i data-lucide="${isCheckIn ? 'log-in' : 'log-out'}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800">${item.name}</h3>
                                <span class="text-[9px] px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-full font-black uppercase">${location}</span>
                            </div>
                            <p class="text-[10px] text-slate-400 mt-0.5 font-medium">${item.type} • Online System</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-between md:justify-end gap-6 border-t md:border-t-0 pt-3 md:pt-0">
                        <div class="text-right"><span class="text-xl font-black ${timeColor}">${badge} ${timeStr}</span></div>
                        ${memoBody ? `<button onclick="viewMemo('${item.name}', '${item.type}', \`${memoBody.replace(/'/g, "\\'").replace(/\n/g, "\\n")}\`)" class="w-10 h-10 flex items-center justify-center rounded-xl bg-indigo-50 text-indigo-600 shadow-sm"><i data-lucide="file-text" class="w-5 h-5"></i></button>` : '<div class="w-10 h-10"></div>'}
                    </div>
                </div>
            `;
        }

        // --- Render Functions (Leaves) ---
        function renderLeaves() {
            const container = document.getElementById('leaveList');
            if (leaveHistory.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-300 italic">ไม่มีรายการรออนุมัติการลา</div>`;
                return;
            }

            container.innerHTML = leaveHistory.map(item => `
                <div class="neo-card bg-white p-6 rounded-[2.5rem] flex flex-col md:flex-row md:items-center gap-6 border-l-4 border-amber-400">
                    <div class="flex items-center gap-5 flex-1">
                        <div class="w-14 h-14 rounded-2xl bg-indigo-600 text-white flex flex-col items-center justify-center shadow-lg">
                            <span class="text-lg font-bold">1</span>
                            <span class="text-[8px] uppercase font-bold opacity-60">วัน</span>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800 text-lg">${item.name}</h3>
                                <span class="text-[10px] px-2 py-0.5 bg-amber-50 text-amber-600 rounded-full font-black uppercase border border-amber-100">${item.type}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-medium">${item.timestamp}</p>
                        </div>
                    </div>
                    <div class="flex flex-1 items-center gap-3">
                        <p class="text-sm text-slate-600 italic">"${item.memo}"</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="approveAction('${item.id}', 'อนุมัติ')" class="px-5 py-2.5 bg-emerald-500 text-white rounded-xl text-xs font-bold shadow-lg shadow-emerald-100">อนุมัติ</button>
                        <button onclick="approveAction('${item.id}', 'ปฏิเสธ')" class="px-5 py-2.5 bg-rose-50 text-rose-500 rounded-xl text-xs font-bold hover:bg-rose-500 hover:text-white transition-all">ปฏิเสธ</button>
                    </div>
                </div>
            `).join('');
        }

        async function approveAction(id, status) {
            const confirm = await Swal.fire({
                title: 'ยืนยันรายการ?',
                text: `คุณต้องการ ${status} คำขอนี้ใช่หรือไม่`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: status === 'อนุมัติ' ? '#10b981' : '#f43f5e',
                confirmButtonText: 'ยืนยัน'
            });

            if (confirm.isConfirmed) {
                Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=approveLeave&id=${id}&status=${encodeURIComponent(status)}`);
                    const result = await res.json();
                    if (result.status === 'success') {
                        leaveHistory = leaveHistory.filter(l => l.id !== id);
                        updateLeaveBadge();
                        renderLeaves();
                        Swal.fire('สำเร็จ!', `ดำเนินการเรียบร้อยแล้ว`, 'success');
                    }
                } catch (e) {
                    Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                }
            }
        }

        // --- Original Helpers ---
        function setView(view) {
            currentView = view;
            document.getElementById('viewWeek').className = view === 'week' ? 'tab-active flex-1 py-2.5 rounded-xl text-xs font-bold transition-all' : 'flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all';
            document.getElementById('viewMonth').className = view === 'month' ? 'tab-active flex-1 py-2.5 rounded-xl text-xs font-bold transition-all' : 'flex-1 py-2.5 rounded-xl text-xs font-bold text-slate-400 transition-all';
            const mCont = document.getElementById('monthContainer');
            if (view === 'month') {
                mCont.classList.remove('hidden');
                const now = new Date();
                document.getElementById('monthInput').value = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}`;
            } else { mCont.classList.add('hidden'); }
            renderData();
        }

        function viewMemo(name, type, text) {
            document.getElementById('memoName').innerText = name;
            document.getElementById('memoType').innerText = type + " • บันทึกข้อความ";
            document.getElementById('memoBody').innerText = text;
            document.getElementById('memoModal').classList.remove('hidden');
        }
        function closeMemo() { document.getElementById('memoModal').classList.add('hidden'); }
        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }
        function saveAdminSettings() {
            localStorage.setItem('cubic_cfg_in', document.getElementById('cfgIn').value);
            localStorage.setItem('cubic_cfg_out', document.getElementById('cfgOut').value);
            renderData(); toggleSettings();
        }

        function exportToCSV() {
            const userFilter = document.getElementById('userFilter').value;
            let filtered = rawHistory;
            if (userFilter) filtered = filtered.filter(d => d.name === userFilter);
            const headers = ["วันที่เวลา", "ชื่อพนักงาน", "ประเภท", "บันทึก/สถานที่"];
            const csvData = "\uFEFF" + [headers.join(","), ...filtered.map(r => [r.timestamp, r.name, r.type, `"${r.memo}"`].join(","))].join("\n");
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `CubicPlus_Report.csv`;
            link.click();
        }

        window.onload = init;
    </script>
</body>
</html>
